version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: fraud-postgres
    environment:
      POSTGRES_USER: fraud
      POSTGRES_PASSWORD: fraudpass
      POSTGRES_DB: frauddb
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fraud -d frauddb"]
      interval: 5s
      timeout: 3s
      retries: 10

  neo4j:
    image: neo4j:5
    container_name: fraud-neo4j
    environment:
      NEO4J_AUTH: neo4j/fraudgraph
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4jdata:/data
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p fraudgraph 'RETURN 1' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  backend:
    build:
      context: ./backend
    container_name: fraud-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+psycopg2://fraud:fraudpass@postgres:5432/frauddb
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: fraudgraph
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-opus-4-8}
      API_KEY: ${API_KEY:-}
      WEBHOOK_SECRET: ${WEBHOOK_SECRET:-}
      FRAUD_BLOCK_THRESHOLD: ${FRAUD_BLOCK_THRESHOLD:-0.8}
      FRAUD_REVIEW_THRESHOLD: ${FRAUD_REVIEW_THRESHOLD:-0.5}
    volumes:
      - ./data:/data:ro   # ✅ FIXED (important)
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8000
        NEXT_PUBLIC_API_KEY: ${API_KEY:-}
    container_name: fraud-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      NEXT_PUBLIC_API_KEY: ${API_KEY:-}
    depends_on:
      backend:
        condition: service_healthy

  n8n:
    image: docker.n8n.io/n8nio/n8n
    container_name: fraud-n8n
    ports:
      - "5678:5678"
    environment:
      N8N_SECURE_COOKIE: "false"
      GENERIC_TIMEZONE: "Asia/Kolkata"
      FRAUD_API_KEY: ${API_KEY:-}
      FRAUD_WEBHOOK_SECRET: ${WEBHOOK_SECRET:-}
      SLACK_WEBHOOK_URL: ${SLACK_WEBHOOK_URL:-}
    volumes:
      - n8ndata:/home/node/.n8n
    depends_on:
      backend:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  pgdata:
  neo4jdata:
  n8ndata: