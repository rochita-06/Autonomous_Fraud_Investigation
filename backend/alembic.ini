[alembic]
script_location = alembic
prepend_sys_path = .
# sqlalchemy.url is intentionally omitted here — alembic/env.py pulls the
# live DATABASE_URL from app.config.settings so dev (SQLite) and prod
# (Postgres) use the exact same source of truth as the running app.

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
